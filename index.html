<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boobo Tea</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* =====================
   COLORS
===================== */
:root {
    --yellow: #FFD54F;
    --black: #111;
    --gray: #f3f3f3;
}

/* =====================
   GLOBAL
===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    color: var(--black);
}

/* =====================
   NAV
===================== */
nav {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    font-weight: 600;
}

/* =====================
   HERO
===================== */
.hero {
    background: var(--yellow);
    padding: 70px 20px 50px;
    text-align: center;
}

.hero h1 {
    font-size: 2.2rem;
}

.hero p {
    margin: 10px 0;
    font-size: 0.95rem;
}

.btn {
    display: inline-block;
    padding: 10px 22px;
    border-radius: 25px;
    background: black;
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-3px);
}

/* =====================
   SECTION
===================== */
section {
    padding: 35px 15px;
    text-align: center;
}

.container {
    max-width: 1000px;
    margin: auto;
}

/* =====================
   IMAGE GRID
===================== */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.grid img {
    width: 100%;
    border-radius: 12px;
    transition: 0.4s;
}

/* hover animation */
.grid img:hover {
    transform: scale(1.07);
}

/* =====================
   MENU
===================== */
.menu {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: var(--gray);
    padding: 15px;
    border-radius: 12px;
    width: 160px;
    transition: 0.3s;
}

.card:hover {
    background: var(--yellow);
    transform: translateY(-5px);
}

/* =====================
   PRICE IMAGE
===================== */
.price img {
    width: 80%;
    max-width: 500px;
    border-radius: 12px;
}

/* =====================
   CONTACT
===================== */
.contact p {
    margin-top: 8px;
}

/* =====================
   STICKY BAR
===================== */
.bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.bar a {
    flex: 1;
    padding: 12px;
    text-align: center;
    text-decoration: none;
    font-size: 0.9rem;
}

.order {
    background: black;
    color: white;
}

.call {
    background: var(--yellow);
    color: black;
}

/* =====================
   MOBILE
===================== */
@media(max-width:768px){

    .grid {
        grid-template-columns: 1fr;
    }

    .hero h1 {
        font-size: 1.8rem;
    }

}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div>Boobo Tea</div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Boobo Tea</h1>
    <p>Fresh bubble tea & aesthetic drinks 🧋</p>

    <a href="https://www.instagram.com/boobo__tea/" class="btn">Order Now</a>
</div>

<!-- IMAGE GRID -->
<section>
    <div class="container">
        <h2>Our Drinks</h2>

        <div class="grid">

            <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/imageye___-_imgi_23_605007664_17865249594539713_2941981634396524078_n.jpg?v=1776942376">
            <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/imageye___-_imgi_21_605771779_17865701763539713_5515280777942363022_n.jpg?v=1776942376">
            <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/imageye___-_imgi_10_632060254_17871819798539713_1103058248486842034_n.jpg?v=1776942375">

            <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/imageye___-_imgi_28_587996447_17862449694539713_8642349878151147118_n.jpg?v=1776942375">
            <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/imageye___-_imgi_62_531285410_17848058556539713_1973715432764123025_n.jpg?v=1776942375">
            <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/imageye___-_imgi_49_548165542_17853168546539713_561485115254571115_n.jpg?v=1776942375">

        </div>
    </div>
</section>

<!-- MENU -->
<section>
    <div class="container">
        <h2>Menu</h2>

        <div class="menu">

            <div class="card">
                <h3>Milk Tea</h3>
                <p>$3.50</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>

            <div class="card">
                <h3>Fruit Tea</h3>
                <p>$3.00</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>

            <div class="card">
                <h3>Taro</h3>
                <p>$4.20</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>

        </div>
    </div>
</section>

<!-- PRICE -->
<section class="price">
    <div class="container">
        <h2>Full Menu</h2>
        <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/pricelist.jpg?v=1776941404">
    </div>
</section>

<!-- CONTACT -->
<section class="contact">
    <h2>Contact</h2>
    <p>📞 055xxxxxx</p>
</section>

<!-- FOOTER -->
<section>
    <p>© 2026 Boobo Tea</p>
</section>

<!-- STICKY BAR -->
<div class="bar">
    <a href="https://www.instagram.com/boobo__tea/" class="order">Order</a>
    <a href="tel:055000000" class="call">Call</a>
</div>

</body>
</html>
