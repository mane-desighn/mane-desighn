<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boobo Tea</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* =====================
   COLORS
===================== */
:root {
    --yellow: #FFD54F;
    --black: #111;
    --gray: #f5f5f5;
}

/* =====================
   GLOBAL
===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: white;
    color: var(--black);
}

/* =====================
   NAV
===================== */
nav {
    display: flex;
    justify-content: space-between;
    padding: 12px 25px;
    font-weight: 500;
}

.logo {
    font-weight: 700;
}

/* =====================
   HERO (SMALLER)
===================== */
.hero {
    background: var(--yellow);
    padding: 80px 20px 60px;
    text-align: center;
    animation: fadeUp 0.8s ease;
}

.hero h1 {
    font-size: 2.2rem;
}

.hero p {
    margin: 10px 0;
    font-size: 0.95rem;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 22px;
    border-radius: 25px;
    background: var(--black);
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-3px);
}

/* =====================
   SECTION
===================== */
section {
    padding: 40px 20px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: auto;
}

/* =====================
   IMAGE (SMALLER = BETTER QUALITY)
===================== */
.img-box img {
    width: 70%;
    max-width: 400px;
    border-radius: 15px;
    margin-top: 15px;
    transition: 0.4s;
}

.img-box img:hover {
    transform: scale(1.05);
}

/* =====================
   MENU
===================== */
.menu {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
}

.card {
    width: 180px;
    padding: 18px;
    border-radius: 15px;
    background: var(--gray);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    background: var(--yellow);
}

.card h3 {
    font-size: 1rem;
    margin-bottom: 5px;
}

.card p {
    font-size: 0.9rem;
}

/* =====================
   PRICE IMAGE
===================== */
.price img {
    width: 75%;
    max-width: 500px;
    border-radius: 15px;
}

/* =====================
   CONTACT
===================== */
.contact p {
    margin-top: 10px;
    font-weight: 500;
}

/* =====================
   STICKY BAR
===================== */
.bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.bar a {
    flex: 1;
    padding: 12px;
    text-align: center;
    text-decoration: none;
    color: white;
    font-size: 0.9rem;
}

.order {
    background: black;
}

.call {
    background: var(--yellow);
    color: black;
}

/* =====================
   ANIMATION
===================== */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

section {
    animation: fadeUp 0.6s ease;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">Boobo Tea</div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Boobo Tea</h1>
    <p>Fresh bubble tea & aesthetic drinks 🧋</p>

    <a href="https://www.instagram.com/boobo__tea/" class="btn">Order Now</a>
</div>

<!-- DRINK IMAGE -->
<section>
    <div class="container img-box">
        <h2>Our Drinks</h2>
        <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/drinks.jpg?v=1776941400">
    </div>
</section>

<!-- FEATURE IMAGE -->
<section>
    <div class="container img-box">
        <h2>Signature Style</h2>
        <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/521654536_17843346438539713_5625889258806642977_n_1.jpg?v=1776941621">
    </div>
</section>

<!-- MENU -->
<section>
    <div class="container">
        <h2>Menu</h2>

        <div class="menu">
            <div class="card">
                <h3>Milk Tea</h3>
                <p>$3.50</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>

            <div class="card">
                <h3>Fruit Tea</h3>
                <p>$3.00</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>

            <div class="card">
                <h3>Taro</h3>
                <p>$4.20</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>
        </div>
    </div>
</section>

<!-- PRICE LIST -->
<section class="price">
    <div class="container">
        <h2>Full Menu</h2>
        <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/pricelist.jpg?v=1776941404">
    </div>
</section>

<!-- CONTACT -->
<section class="contact">
    <h2>Contact</h2>
    <p>📞 055xxxxxx</p>
</section>

<!-- FOOTER -->
<section>
    <p>© 2026 Boobo Tea</p>
</section>

<!-- STICKY BAR -->
<div class="bar">
    <a href="https://www.instagram.com/boobo__tea/" class="order">Order</a>
    <a href="tel:055000000" class="call">Call</a>
</div>

</body>
</html>
