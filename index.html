<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boobo Tea</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =====================
   VARIABLES + DARK MODE
===================== */
:root {
    --bg: #fffdf5;
    --text: #222;
    --card: rgba(255,255,255,0.6);
    --accent: #FFD54F;
}

#dark-toggle:checked ~ * {
    --bg: #121212;
    --text: #eee;
    --card: rgba(255,255,255,0.05);
}

/* =====================
   GLOBAL
===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
}

section {
    padding: 70px 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
    text-align: center;
}

/* =====================
   NAVBAR
===================== */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 30px;
    backdrop-filter: blur(10px);
}

.logo {
    font-weight: 600;
}

.toggle-label {
    cursor: pointer;
}

/* =====================
   HERO
===================== */
.hero {
    height: 100vh;
    background: linear-gradient(135deg,#FFD54F,#FFF176);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    animation: fadeIn 1s ease;
}

.hero h1 {
    font-size: 3rem;
}

.btn {
    padding: 12px 30px;
    border-radius: 30px;
    background: black;
    color: white;
    text-decoration: none;
    margin-top: 10px;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
}

/* =====================
   PHONE BUTTON
===================== */
.call-btn {
    background: #25D366;
}

/* =====================
   GLASS
===================== */
.glass {
    background: var(--card);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
}

/* =====================
   IMAGE
===================== */
.showcase img {
    width: 100%;
    border-radius: 20px;
    margin-top: 20px;
}

/* =====================
   MENU
===================== */
.menu-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.menu-card {
    width: 230px;
    padding: 25px;
    border-radius: 20px;
    background: var(--card);
    backdrop-filter: blur(10px);
    transition: 0.4s;
}

.menu-card:hover {
    transform: translateY(-10px) scale(1.05);
}

/* =====================
   CONTACT
===================== */
input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

/* =====================
   STICKY MOBILE BAR
===================== */
.sticky-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.sticky-bar a {
    flex: 1;
    text-align: center;
    padding: 15px;
    color: white;
    text-decoration: none;
}

.order-bar {
    background: black;
}

.call-bar {
    background: #25D366;
}

/* =====================
   FOOTER
===================== */
footer {
    text-align: center;
    padding: 20px;
}

/* =====================
   ANIMATION
===================== */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<input type="checkbox" id="dark-toggle" hidden>

<!-- NAV -->
<nav>
    <div class="logo">Boobo Tea</div>
    <label for="dark-toggle" class="toggle-label">🌙</label>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Boobo Tea</h1>
    <p>Fresh bubble tea & aesthetic drinks 🧋</p>

    <!-- ORDER BUTTON -->
    <a href="https://www.instagram.com/boobo__tea/" class="btn">Order Now</a>

    <!-- CALL BUTTON -->
    <a href="tel:055000000" class="btn call-btn">Call: 055xxxxxx</a>
</section>

<!-- DRINK IMAGE -->
<section class="showcase">
    <div class="container">
        <h2>Our Drinks</h2>
        <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/drinks.jpg?v=1776941400">
    </div>
</section>

<!-- FEATURE IMAGE -->
<section class="showcase">
    <div class="container">
        <h2>Signature Style</h2>
        <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/521654536_17843346438539713_5625889258806642977_n_1.jpg?v=1776941621">
    </div>
</section>

<!-- MENU -->
<section>
    <div class="container">
        <h2>Menu</h2>

        <div class="menu-grid">

            <div class="menu-card">
                <h3>Milk Tea</h3>
                <p>$3.50</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>

            <div class="menu-card">
                <h3>Fruit Tea</h3>
                <p>$3.00</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>

            <div class="menu-card">
                <h3>Taro Special</h3>
                <p>$4.20</p>
                <a href="tel:055000000" class="btn">Order</a>
            </div>

        </div>
    </div>
</section>

<!-- PRICE LIST -->
<section>
    <div class="container">
        <h2>Full Menu</h2>
        <img src="https://cdn.shopify.com/s/files/1/0726/0740/0014/files/pricelist.jpg?v=1776941404">
    </div>
</section>

<!-- CONTACT -->
<section>
    <div class="container glass">
        <h2>Contact Us</h2>
        <p>📞 055xxxxxx</p>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Boobo Tea</p>
</footer>

<!-- STICKY MOBILE BAR -->
<div class="sticky-bar">
    <a href="https://www.instagram.com/boobo__tea/" class="order-bar">Order Now</a>
    <a href="tel:055000000" class="call-bar">Call</a>
</div>

</body>
</html>
